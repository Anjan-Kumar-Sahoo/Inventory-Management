services:
  mysql:
    image: mysql:8.4
    container_name: godamm-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-inventory_db}
      MYSQL_USER: ${MYSQL_USER:-inventory_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_this_app_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_this_root_password}
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=80
      - --innodb_buffer_pool_size=512M
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - godamm-network

  redis:
    image: redis:7.2-alpine
    container_name: godamm-redis
    restart: unless-stopped
    command: >
      sh -c "redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass '${REDIS_PASSWORD:-change_this_redis_password}'"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '${REDIS_PASSWORD:-change_this_redis_password}' ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - godamm-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE to an immutable image tag (for example docker.io/aksahoo1097/godamm-backend:<git-sha>)}
    container_name: godamm-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_URL: ${DB_URL:-jdbc:mysql://mysql:3306/inventory_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
      DB_USERNAME: ${DB_USERNAME:-inventory_app}
      DB_PASSWORD: ${DB_PASSWORD:-change_this_app_password}
      JWT_SECRET: ${JWT_SECRET:-ChangeThisJwtSecretKeyToAtLeast32CharsLong1234}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_this_redis_password}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://godamm.mraks.dev,https://godamm.anjaliv.dev,http://localhost:5173}
      CACHE_PROVIDER: ${CACHE_PROVIDER:-redis}
      REQUIRE_HTTPS: ${REQUIRE_HTTPS:-true}
      SERVER_PORT: 8080
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - godamm-network

volumes:
  mysql_data:
  redis_data:

networks:
  godamm-network:
    driver: bridge
