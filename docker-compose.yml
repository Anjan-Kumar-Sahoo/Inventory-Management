services:
  redis:
    image: redis:7.2-alpine
    container_name: godamm-redis
    restart: unless-stopped
    command: >
      sh -c "redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass '${REDIS_PASSWORD:-change_this_redis_password}'"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '${REDIS_PASSWORD:-change_this_redis_password}' ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - godamm-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE to an immutable image tag (for example docker.io/aksahoo1097/godamm-backend:<git-sha>)}
    container_name: godamm-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_this_redis_password}
      CACHE_PROVIDER: ${CACHE_PROVIDER:-redis}
      REQUIRE_HTTPS: ${REQUIRE_HTTPS:-true}
      SERVER_PORT: 8080
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - godamm-network

volumes:
  redis_data:

networks:
  godamm-network:
    driver: bridge
