spring.application.name=godamm-inventory
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework

# Load local .env style key=value file if present.
spring.config.import=optional:file:.env[.properties]

# Database (MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/inventory_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:inventory_app}
spring.datasource.password=${DB_PASSWORD:inventory_app_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.pool-name=GodammHikariPool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=${JWT_SECRET:ChangeThisJwtSecretKeyToAtLeast32CharsLong1234}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# OTP
app.otp.expiration-minutes=${OTP_EXPIRATION_MINUTES:10}

# CORS and HTTPS behavior
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:${FRONTEND_URL:http://localhost:5173,https://godamm.mraks.dev,https://godamm.anjaliv.dev}}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
app.security.require-https=${REQUIRE_HTTPS:false}

# Cache provider: simple (default) or redis
app.cache.provider=${CACHE_PROVIDER:simple}

# Redis (used for cache and rate-limit state)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}

# API rate limiting (Redis-backed)
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.rate-limit.fail-open=${RATE_LIMIT_FAIL_OPEN:true}
app.rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:60}
app.rate-limit.max-requests-per-minute=${RATE_LIMIT_MAX_REQUESTS_PER_MINUTE:240}
app.rate-limit.auth-max-requests-per-minute=${RATE_LIMIT_AUTH_MAX_REQUESTS_PER_MINUTE:60}

# Observability
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# Logging (console + file)
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
logging.file.name=${LOG_FILE:logs/inventory-app.log}
logging.pattern.console={"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}","level":"%p","thread":"%t","logger":"%logger{36}","message":"%replace(%msg){'"','\\"'}"}%n
logging.pattern.file={"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}","level":"%p","thread":"%t","logger":"%logger{36}","message":"%replace(%msg){'"','\\"'}"}%n

# Test data seeding disabled by default
app.seed-test-data=${SEED_TEST_DATA:false}

# Mail (env-driven)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000